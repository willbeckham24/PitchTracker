<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dugout Scout Pro</title>
    <style>
        :root { 
            --bg: #020617; --card: #111827; --accent: #38bdf8; 
            --strike: #dc2626; --ball: #16a34a; --gold: #facc15; 
            --border: #334155; --high-tendency: rgba(250, 204, 21, 0.2);
        }
        
        body { font-family: system-ui, sans-serif; background: var(--bg); color: white; margin: 0; padding: 8px; display: flex; flex-direction: column; align-items: center; -webkit-tap-highlight-color: transparent; }
        .container { width: 100%; max-width: 480px; }

        .session-header { background: #000; padding: 10px; border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--accent); }
        .pitcher-name-display { text-align: center; color: var(--gold); font-weight: 800; font-size: 0.95rem; margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        #headerRows { display: flex; flex-direction: column; gap: 4px; }
        .header-grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr 1fr; gap: 5px; align-items: center; padding: 4px 0; border-bottom: 1px solid #1e293b; }
        .h-label { font-size: 0.7rem; color: #94a3b8; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .h-col { text-align: center; }
        .h-val { font-size: 1.1rem; font-weight: 900; color: white; }

        .dashboard { background: var(--card); border-radius: 12px; padding: 8px; margin-bottom: 10px; border: 1px solid var(--border); }
        .dash-title { font-size: 0.75rem; font-weight: 900; color: var(--accent); margin-bottom: 6px; text-align: center; letter-spacing: 1px; }

        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; table-layout: fixed; }
        th { text-align: center; color: #94a3b8; padding-bottom: 6px; font-size: 0.55rem; text-transform: uppercase; }
        td { padding: 8px 0; border-top: 1px solid var(--border); text-align: center; }
        
        .tendency-alert { color: var(--gold); font-weight: 900; background: var(--high-tendency); }
        .pitch-name { text-align: left; font-weight: 800; color: #fff; padding-left: 5px; font-size: 0.75rem; overflow: hidden; }
        small { display: block; font-size: 0.55rem; color: #64748b; font-weight: normal; }

        .hud { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding: 0 10px; }
        .side-indicator { font-weight: 900; color: var(--accent); font-size: 1.3rem; }
        .count-num { font-size: 3.2rem; font-weight: 900; letter-spacing: -2px; }

        #pitchActionArea { width: 100%; }
        .pitch-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .btn-pitch { padding: 18px 2px; border: none; font-weight: 900; color: white; border-radius: 8px; font-size: 0.8rem; box-shadow: 0 4px 0 rgba(0,0,0,0.3); text-transform: uppercase; }
        .btn-pitch:active { transform: translateY(2px); box-shadow: none; }
        .strike { background: var(--strike); }
        .ball { background: var(--ball); }

        .util-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .btn-util { background: #475569; padding: 12px 5px; border: none; border-radius: 6px; color: white; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; }
        .btn-side { background: var(--accent); color: #000; }
        .btn-danger { background: #1e3a8a; }
        .btn-newgame { background: #450a0a; grid-column: span 2; margin-top: 4px; border: 1px solid #991b1b; }

        #setupModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; overflow-y: auto; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--accent); width: 85%; max-width: 350px; margin: 20px auto; }
        .modal-content h3 { margin-top: 0; color: var(--accent); text-align: center; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.7rem; color: #94a3b8; margin-bottom: 4px; }
        .input-group input, .input-group select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 5px; box-sizing: border-box; }
        .modal-btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 12px; font-weight: bold; border-radius: 5px; margin-top: 10px; }
        
        .pitch-config-row { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 5px; }
    </style>
</head>
<body>

<div id="setupModal">
    <div class="modal-content">
        <h3>PITCHER SETUP</h3>
        <div class="input-group">
            <label>PITCHER NAME</label>
            <input type="text" id="setupName" placeholder="e.g. Smith">
        </div>
        <div class="input-group">
            <label>NUMBER OF PITCHES</label>
            <select id="pitchCountSelect" onchange="renderSetupInputs()">
                <option value="2">2 Pitches</option>
                <option value="3" selected>3 Pitches</option>
                <option value="4">4 Pitches</option>
                <option value="5">5 Pitches</option>
            </select>
        </div>
        <div id="dynamicInputs"></div>
        <button class="modal-btn" onclick="confirmSetup()">START TRACKING</button>
    </div>
</div>

<div class="container">
    <div class="session-header">
        <div class="pitcher-name-display" id="displayName">LOADING...</div>
        <div id="headerRows"></div>
    </div>

    <div class="dashboard"><div class="dash-title">VS LEFT-HANDED HITTERS</div><table><thead><tr><th style="width:20%;text-align:left;">SIT.</th><th>0-0</th><th>NEUTRAL</th><th>PITCHER+</th><th>HITTER+</th></tr></thead><tbody id="statBodyLHH"></tbody></table></div>
    <div class="dashboard"><div class="dash-title">VS RIGHT-HANDED HITTERS</div><table><thead><tr><th style="width:20%;text-align:left;">SIT.</th><th>0-0</th><th>NEUTRAL</th><th>PITCHER+</th><th>HITTER+</th></tr></thead><tbody id="statBodyRHH"></tbody></table></div>

    <div class="hud">
        <div id="sideDisplay" class="side-indicator">VS RHH</div>
        <div class="count-num" id="countDisplay">0 - 0</div>
    </div>

    <div id="pitchActionArea"></div>

    <div class="util-grid">
        <button class="btn-util btn-side" onclick="newBatter('RHH')">NEW RHH</button>
        <button class="btn-util btn-side" onclick="newBatter('LHH')">NEW LHH</button>
        <button class="btn-util" onclick="undo()">UNDO</button>
        <button class="btn-util" onclick="exportData()" style="background:#059669;">EXPORT</button>
        <button class="btn-util btn-danger" onclick="openSetup()">NEW PITCHER</button>
        <button class="btn-util btn-newgame" onclick="newGame()">NEW GAME (WIPE ALL)</button>
    </div>
</div>

<script>
    let balls = 0, strikes = 0, side = 'RHH', pitcherName = "Unknown";
    let labels = {}; // Stores { P1: "FB", P2: "SL", ... }
    let sessionPitches = JSON.parse(localStorage.getItem('sessionPitches')) || [];
    let archiveSessions = JSON.parse(localStorage.getItem('archiveSessions')) || [];

    const situGroups = { zero: ['0-0'], neutral: ['1-1','2-2','3-2'], ahead: ['0-1','0-2','1-2'], behind: ['1-0','2-0','3-0','2-1','3-1'] };
    const pitchOptions = [
        {val: "FB", label: "Fastball"}, {val: "SINK", label: "Sinker"}, {val: "CUT", label: "Cutter"},
        {val: "SL", label: "Slider"}, {val: "CB", label: "Curveball"}, {val: "SW", label: "Sweeper"},
        {val: "CH", label: "Changeup"}, {val: "SPL", label: "Splitter"}, {val: "KN", label: "Knuckleball"},
        {val: "CUSTOM", label: "Other..."}
    ];

    function init() {
        const savedLabels = localStorage.getItem('pitchLabels');
        const savedName = localStorage.getItem('currentPitcher');
        if (savedLabels) {
            labels = JSON.parse(savedLabels);
            pitcherName = savedName || "Unknown";
            updateUI();
        } else {
            openSetup();
        }
    }

    function renderSetupInputs() {
        const count = parseInt(document.getElementById('pitchCountSelect').value);
        const container = document.getElementById('dynamicInputs');
        container.innerHTML = "";
        for (let i = 1; i <= count; i++) {
            const div = document.createElement('div');
            div.className = "input-group";
            let optionsHtml = pitchOptions.map(o => `<option value="${o.val}">${o.label}</option>`).join('');
            div.innerHTML = `
                <label>PITCH ${i}</label>
                <div class="pitch-config-row">
                    <select id="setupP${i}" onchange="toggleCustom(${i})">${optionsHtml}</select>
                    <input type="text" id="customP${i}" style="display:none;" placeholder="Name">
                </div>
            `;
            container.appendChild(div);
        }
    }

    function toggleCustom(num) {
        const sel = document.getElementById(`setupP${num}`);
        const cus = document.getElementById(`customP${num}`);
        cus.style.display = (sel.value === 'CUSTOM') ? 'block' : 'none';
    }

    function save() {
        localStorage.setItem('sessionPitches', JSON.stringify(sessionPitches));
        localStorage.setItem('archiveSessions', JSON.stringify(archiveSessions));
        localStorage.setItem('currentPitcher', pitcherName);
        localStorage.setItem('pitchLabels', JSON.stringify(labels));
        updateUI();
    }

    function logPitch(key, isStrike) {
        sessionPitches.push({ type: labels[key], typeKey: key, count: `${balls}-${strikes}`, side, isStrike });
        if (isStrike) { if (strikes < 2) strikes++; } 
        else { balls++; if (balls >= 4) { balls = 0; strikes = 0; } }
        save();
    }

    function openSetup() {
        if (sessionPitches.length > 0) {
            if (!confirm("Are you sure you want to change pitchers? This moves current data to the archive.")) return;
            archiveSessions.push({ name: pitcherName, data: sessionPitches, labels: Object.assign({}, labels) });
        }
        sessionPitches = []; balls = 0; strikes = 0;
        document.getElementById('setupModal').style.display = 'flex';
        renderSetupInputs();
    }

    function confirmSetup() {
        pitcherName = document.getElementById('setupName').value || "Unknown";
        const count = parseInt(document.getElementById('pitchCountSelect').value);
        labels = {};
        for (let i = 1; i <= count; i++) {
            const sel = document.getElementById(`setupP${i}`);
            const cus = document.getElementById(`customP${i}`);
            labels[`P${i}`] = (sel.value === 'CUSTOM') ? (cus.value || "OTHER") : sel.value;
        }
        document.getElementById('setupModal').style.display = 'none';
        save();
    }

    function updateUI() {
        document.getElementById('countDisplay').innerText = `${balls} - ${strikes}`;
        document.getElementById('sideDisplay').innerText = `VS ${side}`;
        document.getElementById('displayName').innerText = `${pitcherName} | PITCHES: ${sessionPitches.length}`;
        
        const keys = Object.keys(labels);
        
        // 1. Render Header Rows
        let headerHtml = `<div class="label-row" style="display:grid; grid-template-columns:1.2fr 1fr 1fr 1fr; font-size:0.6rem; color:var(--accent); text-align:center; font-weight:800; margin-bottom:5px;">
                            <div style="text-align:left;">TYPE</div><div>TOTAL</div><div>vs LHH</div><div>vs RHH</div>
                         </div>`;
        keys.forEach(k => {
            const count = sessionPitches.filter(p => p.typeKey === k).length;
            const totalPct = sessionPitches.length ? Math.round((count / sessionPitches.length) * 100) : 0;
            const lhhData = sessionPitches.filter(p => p.side === 'LHH');
            const rhhData = sessionPitches.filter(p => p.side === 'RHH');
            const lPct = lhhData.length ? Math.round((lhhData.filter(p => p.typeKey === k).length / lhhData.length) * 100) : 0;
            const rPct = rhhData.length ? Math.round((rhhData.filter(p => p.typeKey === k).length / rhhData.length) * 100) : 0;
            
            headerHtml += `
                <div class="header-grid">
                    <div class="h-label">${labels[k]}</div>
                    <div class="h-col"><span class="h-val">${totalPct}%</span></div>
                    <div class="h-col"><span class="h-val">${lPct}%</span></div>
                    <div class="h-col"><span class="h-val">${rPct}%</span></div>
                </div>`;
        });
        document.getElementById('headerRows').innerHTML = headerHtml;

        // 2. Render Action Buttons
        let btnHtml = "";
        keys.forEach(k => {
            btnHtml += `<div class="pitch-row">
                <button class="btn-pitch strike" onclick="logPitch('${k}', true)">${labels[k]} STK</button>
                <button class="btn-pitch ball" onclick="logPitch('${k}', false)">${labels[k]} BAL</button>
            </div>`;
        });
        document.getElementById('pitchActionArea').innerHTML = btnHtml;

        // 3. Render Tables
        ['LHH','RHH'].forEach(curSide => {
            const sideData = sessionPitches.filter(p => p.side === curSide);
            let html = "";
            keys.forEach(k => {
                html += `<tr><td class="pitch-name">${labels[k]}</td>`;
                ['zero','neutral','ahead','behind'].forEach(sit => {
                    const sitData = sideData.filter(p => situGroups[sit].includes(p.count));
                    const c = sitData.filter(p => p.typeKey === k).length;
                    const pct = sitData.length ? Math.round((c/sitData.length)*100) : 0;
                    html += `<td ${pct >= 60 ? 'class="tendency-alert"' : ''}>${pct}%<small>(${c})</small></td>`;
                });
                html += "</tr>";
            });
            document.getElementById(`statBody${curSide}`).innerHTML = html;
        });
    }

    function newGame() {
        if(confirm("Wipe all data?")) { localStorage.clear(); location.reload(); }
    }

    function exportData() {
        const all = [...archiveSessions, { name: pitcherName, data: sessionPitches, labels: labels }];
        if (all.length === 0 || (all.length === 1 && all[0].data.length === 0)) return alert("No data.");
        
        let csv = "";
        const counts = ['0-0','1-1','2-2','0-1','0-2','1-2','1-0','2-0','2-1','3-1','3-2','3-0'];
        const excelCounts = counts.map(c => `="${c}"`);
        const keys = Object.keys(labels);

        all.forEach(s => {
            csv += `PITCHER: ${s.name}\n\n`;

            // --- SECTION 1: RAW FREQUENCY MATRICES ---
            csv += "SECTION 1: RAW PITCH COUNTS (VOLUME)\n";
            const sections = [{t:"TOTAL",f:null}, {t:"vs RHH",f:"RHH"}, {t:"vs LHH",f:"LHH"}];
            
            sections.forEach(sec => {
                csv += `${sec.t}\nCOUNT:,${excelCounts.join(",")}\n`;
                keys.forEach(k => {
                    let row = `${s.labels[k]},`;
                    let data = counts.map(cnt => s.data.filter(p => (!sec.f || p.side === sec.f) && p.count === cnt && p.typeKey === k).length);
                    csv += row + data.join(",") + "\n";
                });
                csv += "\n";
            });

            csv += "\n------------------------------------------------\n";

            // --- SECTION 2: GLOBAL PITCH MIX (As requested) ---
            csv += "SECTION 2: GLOBAL PITCH MIX SUMMARY\n";
            csv += "TYPE,TOTAL,vs LHH,vs RHH\n";
            keys.forEach(k => {
                const totalN = s.data.length;
                const lhhN = s.data.filter(p => p.side === 'LHH').length;
                const rhhN = s.data.filter(p => p.side === 'RHH').length;

                const tPct = totalN ? Math.round((s.data.filter(p => p.typeKey === k).length / totalN) * 100) : 0;
                const lPct = lhhN ? Math.round((s.data.filter(p => p.side === 'LHH' && p.typeKey === k).length / lhhN) * 100) : 0;
                const rPct = rhhN ? Math.round((s.data.filter(p => p.side === 'RHH' && p.typeKey === k).length / rhhN) * 100) : 0;

                csv += `${s.labels[k]},${tPct}%,${lPct}%,${rPct}%\n`;
            });

            csv += "\n------------------------------------------------\n";

            // --- SECTION 3: SITUATIONAL PERCENTAGES ---
            csv += "SECTION 3: SITUATIONAL PERCENTAGES (SIT-CHARTS)\n";
            const sitLabels = ["0-0", "NEUTRAL", "PITCHER+", "HITTER+"];
            const sitGroups = { 
                "0-0": ['0-0'], 
                "NEUTRAL": ['1-1','2-2','3-2'], 
                "PITCHER+": ['0-1','0-2','1-2'], 
                "HITTER+": ['1-0','2-0','3-0','2-1','3-1'] 
            };
            
            sections.forEach(sec => {
                csv += `${sec.t} SITUATIONAL MIX\nSITUATION:,${sitLabels.join(",")}\n`;
                keys.forEach(k => {
                    let row = `${s.labels[k]},`;
                    let pcts = sitLabels.map(sit => {
                        const sitData = s.data.filter(p => (!sec.f || p.side === sec.f) && sitGroups[sit].includes(p.count));
                        const c = sitData.filter(p => p.typeKey === k).length;
                        return (sitData.length ? Math.round((c/sitData.length)*100) : 0) + "%";
                    });
                    csv += row + pcts.join(",") + "\n";
                });
                csv += "\n";
            });

            csv += "---\n\n";
        });

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement("a");
        const url = URL.createObjectURL(blob);
        a.href = url;
        a.download = `Full_Scout_Report_${new Date().toLocaleDateString().replace(/\//g,'-')}.csv`;
        a.click();
        URL.revokeObjectURL(url);
    }
    function undo() { if(sessionPitches.length > 0) { sessionPitches.pop(); balls = 0; strikes = 0; save(); } }
    function newBatter(s) { balls = 0; strikes = 0; side = s; updateUI(); }

    init();
</script>
</body>
</html>
